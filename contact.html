<!DOCTYPE html>
<html lang="ru" data-layout="bootstrap-grid">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оставить заявку - Crystal Clear Design</title>
  <link rel="stylesheet" href="style/styles_contact.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="contact-page">
  <div class="page-wrapper">

    <header class="header">
      <div class="header__container">
        <a href="index.html" class="logo">Crystal clear Design</a>
        <nav class="nav">
          <a href="index.html" class="nav__link">на главную</a>
          <a href="portfolio.html" class="nav__link">портфолио</a>
          <a href="workflow.html" class="nav__link">ход работы</a>
          <a href="pricing.html" class="nav__link">цена</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="main__content">
        <div class="container-fluid px-0">
          <div class="row g-0 align-items-start">
            <div class="col-12 col-lg-6">
              <div class="hero-text">
                <h1 class="hero-text__title">Оставить<br>заявку</h1>
                <p class="hero-text__description">получи бесплатную консультацию</p>
                <div class="contact-links">
                  <a href="https://t.me/" class="contact-links__item">Telegram</a>
                  <a href="https://behance.net/" class="contact-links__item">Behance</a>
                  <a href="mailto:o.krisshtal@mail.ru" class="contact-links__item">Почта: o.krisshtal@mail.ru</a>
                </div>
              </div>
            </div>
            <div class="col-12 col-lg-6">
              <section class="form-wrapper">
                <form class="contact-form" action="#" method="post">
                  <div class="contact-form__fields">
                    <input type="text" name="name" placeholder="Имя" class="contact-form__input" required>
                    <input type="tel" name="phone" placeholder="Телефон" class="contact-form__input" required>
                    <input type="text" name="telegram" placeholder="Telegram" class="contact-form__input">
                    <input type="text" name="description" placeholder="Описание проекта" class="contact-form__input">
                  </div>
                  <div class="contact-form__submit">
                    <button type="submit" class="btn btn--primary">Отправить форму</button>
                  </div>
                </form>
              </section>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__container">
        <a href="index.html" class="logo">Crystal clear Design</a>
        <div class="footer__links">
          <a href="privacy.html" class="footer__link">Политика конфиденциальности</a>
          <span class="footer__text">Концепт от</span>
        </div>
      </div>
    </footer>
  </div>

  <!-- Попап в виде фотографии -->
<div id="successPopup" class="popup-overlay">
  <div class="popup-photo">
    <h2>Форма успешно отправлена!</h2>
    <p>Ожидайте сообщения!</p>
    <button class="popup-close">закрыть</button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('.contact-form');
    const popup = document.getElementById('successPopup');
    const closeBtn = popup.querySelector('.popup-close');

    function showPopup() {
      popup.classList.add('active');
    }
    function hidePopup() {
      popup.classList.remove('active');
    }

    if (form) {
      form.addEventListener('submit', function(event) {
        event.preventDefault();
        showPopup();
        form.reset();
      });
    }

    closeBtn.addEventListener('click', hidePopup);
    popup.addEventListener('click', function(e) {
      if (e.target === popup) hidePopup();
    });
  });
</script>

</script>
</body>
</html>
